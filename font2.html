<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #Header_Top{
            height: 100px;
            background-color: red;
            font-size: 40px;
            color: #fff;
            text-align: center;
            padding-top: 30px;
        }
        #Nav_Top{
            height: 30px;
            text-align: center;
            background-color: cyan;
            padding-top: 7px;
        }
        #Panel_Right{
            height: 500px;
            width: 30%;
            text-align: center;
            background-color: lightblue;
            font-size: 20px;
            padding-top: 240px;
            float: right;
        }
        #Content{
            height: 500px;
            width: 70%;
            text-align: center;
            background-color: rgb(87, 52, 120);
            font-size: 20px;
            padding-top: 240px;
            float: left;
        }
        #Footer{
            height: 100px;
            clear: both;
            text-align: center;
            background-color: rgb(16, 15, 15);
            font-size: 20px;
            color: #edeaea;
            padding-top: 40px;
        }
        #Footer1{
            height: 100px;
            text-align: center;
            background-color: #ddd;
            font-size: 20px;
            color: #000;
            padding-top: 40px;
        }
    </style>
</head>
<body>
    <div id="Header_Top">My Website</div>
    <div id="Nav_Top">Nav</div>
    <div id="Panel_Right">Panel</div>
    <div id="Content">Content</div>
    <div id="Footer">footer</div>
    <div id="Footer1">footer1</div>
</body>
</html>
