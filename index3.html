<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 50px;
        }
        .link{
            text-decoration: none;
            padding: 15px 25px;
            color: white;
            border: 1px solid #000;
            border-radius: 3px;
            transition-duration: 0.7s;
        }
        .link1{
            background-color: #1a1070;
        }
        .link1:hover{
            background-color: rgb(0, 76, 255);
        }
        .link2{
            background-color: #0e4b13;
        }
        .link2:hover{
            background-color: #08fc1c;
        }
        .link3{
            background-color: #000;
            color: white;
        }
        .link3:hover{
            background-color: white;
            color: #000;
        }
    </style>
</head>
<body>
    <a class="link link1" href="#">Click</a>
    <a class="link link2" href="#">Click</a>
    <button class="link link3">click</button>
</body>
</html>
